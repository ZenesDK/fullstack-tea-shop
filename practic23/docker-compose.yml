version: '3.8'

services:
  # --- Балансировщик нагрузки (Nginx) ---
  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - app-network

  # --- Backend Экземпляр 1 ---
  backend1:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-1
      - MONGODB_URI=mongodb://mongodb:27017/tea_shop_db
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3003
      - ACCESS_SECRET=your_access_secret
      - REFRESH_SECRET=your_refresh_secret
    depends_on:
      - mongodb
      - redis
    networks:
      - app-network

  # --- Backend Экземпляр 2 ---
  backend2:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-2
      - MONGODB_URI=mongodb://mongodb:27017/tea_shop_db
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3003
      - ACCESS_SECRET=your_access_secret
      - REFRESH_SECRET=your_refresh_secret
    depends_on:
      - mongodb
      - redis
    networks:
      - app-network

  # --- MongoDB ---
  mongodb:
    image: mongo:6
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # --- Redis ---
  redis:
    image: redis:7
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data: