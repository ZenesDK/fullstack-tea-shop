# nginx_load_balancer.conf
events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        server 127.0.0.1:3000 max_fails=2 fail_timeout=30s;
        server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
        server 127.0.0.1:3002 backup;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://backend_servers;
            
            # Передаём оригинальные заголовки от браузера
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 🔥 КЛЮЧЕВОЕ: передаём Origin, чтобы backend мог проверить CORS
            proxy_set_header Origin $http_origin;
            
            # Разрешаем передачу заголовков авторизации
            proxy_pass_request_headers on;
        }
    }
}