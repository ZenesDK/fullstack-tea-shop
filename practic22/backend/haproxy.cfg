# haproxy.cfg
global
    daemon # Запускаем как демон (фоновый процесс)
    maxconn 256 # Максимальное количество соединений

defaults
    mode http # Режим HTTP
    timeout connect 5000ms # Таймаут подключения к backend
    timeout client 50000ms # Таймаут ожидания от клиента
    timeout server 50000ms # Таймаут ожидания от сервера

# Frontend: точка входа для клиентов
frontend http_front
    bind *:8081 # HAProxy будет слушать на порту 8081
    default_backend http_back # По умолчанию используем backend http_back

# Backend: группа наших backend-серверов
backend http_back
    balance roundrobin # Алгоритм round robin (по умолчанию)
    server server1 127.0.0.1:3000 check # Основной сервер 1
    server server2 127.0.0.1:3001 check # Основной сервер 2
    server server3 127.0.0.1:3002 check backup # Резервный сервер